<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Cyber Snake 🐍</title>
    <style>
        :root {
            --bg-dark: #0b0d13;
            --prime-gold: #D4AF37;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --system-red: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: none; /* Biar layar HP ga ikut geser pas main */
        }

        .game-container {
            background: rgba(19, 22, 34, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(214, 175, 55, 0.2);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 360px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--prime-gold);
            margin-top: 0;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .score-box {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        #score {
            color: var(--prime-gold);
            font-weight: bold;
        }

        /* Canvas Arena Game */
        canvas {
            background: #050608;
            border: 2px solid rgba(214, 175, 55, 0.3);
            border-radius: 10px;
            display: block;
            margin: 0 auto 20px auto;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* Tombol Kontrol khusus HP (D-Pad) */
        .controls-dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 160px;
            margin: 0 auto 20px auto;
        }

        .dpad-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(214, 175, 55, 0.3);
            color: #fff;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            outline: none;
        }

        .dpad-btn:active {
            background: rgba(214, 175, 55, 0.2);
        }

        /* Action Buttons */
        .btn-link {
            display: block;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            box-sizing: border-box;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            background: none;
        }

        .btn-back:hover {
            border-color: var(--prime-gold);
            color: #fff;
            background: rgba(214, 175, 55, 0.05);
        }

        .btn-restart {
            background: var(--prime-gold);
            color: #111;
            border: none;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Ula kadut emas 🐍</h1>
        <div class="score-box">Skor Lu: <span id="score">0</span></div>

        <!-- Arena Uler -->
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <!-- D-Pad Kontrol Layar Sentuh HP -->
        <div class="controls-dpad">
            <td></td>
            <button class="dpad-btn" onclick="changeDirection('UP')">▲</button>
            <td></td>
            <button class="dpad-btn" onclick="changeDirection('LEFT')">◀</button>
            <button class="dpad-btn" style="visibility: hidden;"></button>
            <button class="dpad-btn" onclick="changeDirection('RIGHT')">▶</button>
            <td></td>
            <button class="dpad-btn" onclick="changeDirection('DOWN')">▼</button>
            <td></td>
        </div>

        <button onclick="restartGame()" id="restart-btn" class="btn-link btn-restart">Main Lagi 🔄</button>
        <a href="#" class="btn-link btn-back">mencet nya kebalik balik terus ya wkwk</a>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const restartBtn = document.getElementById("restart-btn");

        const box = 15; // Ukuran kotak per baris/kolom grid (300 / 15 = 20 grid)
        let snake;
        let food;
        let score;
        let d;
        let gameLoop;
        let isGameOver = false;

        // Mulai game
        initGame();

        function initGame() {
            snake = [{ x: 10 * box, y: 10 * box }];
            generateFood();
            score = 0;
            scoreDisplay.innerText = score;
            d = null; // Arah awal diam sampai user pencet tombol
            isGameOver = false;
            restartBtn.style.display = "none";
            
            clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100); // Kecepatan uler (100ms per gerak)
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * 20) * box,
                y: Math.floor(Math.random() * 20) * box
            };
        }

        // Handle Input Keyboard PC
        document.addEventListener("keydown", direction);
        function direction(event) {
            if (isGameOver) return;
            if (event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if (event.keyCode == 38 && d != "DOWN") d = "UP";
            else if (event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if (event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        // Handle Input D-Pad HP
        function changeDirection(dir) {
            if (isGameOver) return;
            if (dir == "LEFT" && d != "RIGHT") d = "LEFT";
            else if (dir == "UP" && d != "DOWN") d = "UP";
            else if (dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            else if (dir == "DOWN" && d != "UP") d = "DOWN";
        }

        // Deteksi Tabrakan
        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        // Fungsi Render Utama Gambar Game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar Uler Neon Gold
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i == 0 ? "#FFF" : "var(--prime-gold)";
                ctx.strokeStyle = "rgba(214, 175, 55, 0.5)";
                ctx.shadowBlur = i == 0 ? 12 : 5;
                ctx.shadowColor = "var(--prime-gold)";
                
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.shadowBlur = 0; // Reset efek glow

            // Gambar Umpan Koin Neon
            ctx.fillStyle = "#10b981";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#10b981";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0; // Reset

            // Posisi Kepala Uler Lama
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Logika Arah Berjalan
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Jika Uler Makan Umpan
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreDisplay.innerText = score;
                generateFood();
                // Canvas dapet kilatan flash tipis pas makan
                canvas.style.borderColor = "#10b981";
                setTimeout(() => canvas.style.borderColor = "rgba(214, 175, 55, 0.3)", 150);
            } else {
                snake.pop(); // Buang buntut paling belakang
            }

            // Bikin Kepala Uler Baru
            let newHead = { x: snakeX, y: snakeY };

            // Game Over Rules (Nabrak tembok atau tubuh sendiri)
            if (
                snakeX < 0 || snakeX >= canvas.width || 
                snakeY < 0 || snakeY >= canvas.height || 
                collision(newHead, snake)
            ) {
                clearInterval(gameLoop);
                isGameOver = true;
                restartBtn.style.display = "block";
                
                // Efek Merah pas Game Over
                ctx.fillStyle = "rgba(239, 68, 68, 0.2)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "var(--system-red)";
                ctx.font = "bold 20px Segoe UI";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER 💀", canvas.width/2, canvas.height/2);
                return;
            }

            snake.unshift(newHead); // Masukin kepala baru ke barisan depan tubuh uler
        }

        function restartGame() {
            initGame();
        }
    </script>

</body>
      </html>
