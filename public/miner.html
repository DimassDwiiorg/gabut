<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaCoin Miner 🎮</title>
    <style>
        :root {
            --bg-dark: #0b0d13;
            --card-bg: #131622;
            --prime-gold: #D4AF37;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container Utama Efek Kaca */
        .miner-container {
            background: rgba(19, 22, 34, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(214, 175, 55, 0.2);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--prime-gold);
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        /* Area Koin Emas Utama */
        .coin-wrapper {
            position: relative;
            margin: 40px auto;
            width: 160px;
            height: 160px;
        }

        .gold-coin {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f39c12, #d35400);
            border: 6px solid var(--prime-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            transition: transform 0.05s ease;
        }

        /* Animasi nge-klik membal */
        .gold-coin:active {
            transform: scale(0.92);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* Papan Skor */
        .score-board {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-val {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--prime-gold);
            margin-top: 5px;
        }

        /* Tombol Back */
        .back-btn {
            display: inline-block;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--prime-gold);
            color: #fff;
            background: rgba(214, 175, 55, 0.05);
        }

        /* Efek Teks Melayang (+1) Pas Diklik */
        .floating-text {
            position: absolute;
            color: #fff;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
        }
    </style>
</head>
<body>

    <div class="miner-container">
        <h1>NexaCoin Miner ⛏️</h1>
        <p class="subtitle">Ketuk koin emas di bawah buat nambang koin ghaib sepuasnya.</p>

        <!-- Papan Skor -->
        <div class="score-board">
            <div class="score-label">Total Saldo Lu</div>
            <div class="score-val"><span id="coin-display">0</span> <span style="font-size: 1.2rem;">NC</span></div>
        </div>

        <!-- Area Klik Koin -->
        <div class="coin-wrapper">
            <div id="coin-clicker" class="gold-coin">🪙</div>
        </div>

        <!-- Tombol Kembali -->
        <a href="index.html" class="back-btn">⬅ Kembali ke Dashboard</a>
    </div>

    <script>
        // Ambil data koin lama dari localStorage biar gak reset pas refresh
        let coins = localStorage.getItem('nexaCoinsTotal') ? parseInt(localStorage.getItem('nexaCoinsTotal')) : 0;
        const coinDisplay = document.getElementById('coin-display');
        const coinClicker = document.getElementById('coin-clicker');
        const wrapper = document.querySelector('.coin-wrapper');

        // Set skor awal pas halaman dibuka
        coinDisplay.innerText = coins.toLocaleString('id-ID');

        // Fungsi mining pas koin diklik
        coinClicker.addEventListener('click', (e) => {
            coins++;
            localStorage.setItem('nexaCoinsTotal', coins);
            coinDisplay.innerText = coins.toLocaleString('id-ID');

            // Bikin efek "+1" melayang di posisi jari/kursor
            createFloatingText(e.offsetX, e.offsetY);
        });

        // Logic buat bikin text melayang ala game clicker pro
        function createFloatingText(x, y) {
            const txt = document.createElement('div');
            txt.innerText = '+1';
            txt.className = 'floating-text';
            txt.style.left = `${x + 40}px`;
            txt.style.top = `${y + 40}px`;

            wrapper.appendChild(txt);

            // Hapus element biar gak menuh-menuhin HTML
            setTimeout(() => {
                txt.remove();
            }, 600);
        }
    </script>

</body>
</html>
