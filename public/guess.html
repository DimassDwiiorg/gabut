<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Guessing Game 🎮</title>
    <style>
        :root {
            --bg-dark: #0b0d13;
            --card-bg: #131622;
            --prime-gold: #D4AF37;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --system-red: #ef4444;
            --system-green: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container Glassmorphism */
        .game-container {
            background: rgba(19, 22, 34, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(214, 175, 55, 0.2);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--prime-gold);
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .hint-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Status Nyawa / Hearts */
        .lives-box {
            font-size: 0.9rem;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .lives-count {
            color: var(--system-red);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Input Form */
        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .guess-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            width: 90px;
            text-align: center;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s;
        }

        .guess-input:focus {
            border-color: var(--prime-gold);
        }

        /* Hilangin panah up-down bawaan input type number */
        .guess-input::-webkit-outer-spin-button,
        .guess-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-submit {
            background: var(--prime-gold);
            color: #111;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        /* Tombol Action (Back & Reset) */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .btn-link {
            display: block;
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .btn-back {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            background: none;
        }

        .btn-back:hover {
            border-color: var(--prime-gold);
            color: #fff;
            background: rgba(214, 175, 55, 0.05);
        }

        .btn-reset {
            background: var(--prime-gold);
            color: #111;
            border: none;
            font-weight: bold;
            display: none; /* Muncul pas game over/menang */
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Nexa Guess 🎲</h1>
        
        <!-- Status Nyawa -->
        <div class="lives-box">
            Sisa Kesempatan: <span id="lives" class="lives-count">❤️ ❤️ ❤️ ❤️ ❤️ ❤️ ❤️</span>
        </div>

        <!-- Kotak Petunjuk / Respond AI -->
        <div id="hint" class="hint-box" style="flex-direction: column; gap: 10px;">
            <!-- Gif Rusdi tersembunyi secara default -->
            <img id="winner-gif" src="rusdi.gif" alt="Nah Ini" style="display: none; width: 100%; max-width: 180px; border-radius: 10px; margin-bottom: 5px;">
            <div id="hint-text">Gua udah ngantongin satu angka dari 1 sampai 100. Coba tebak kalau lu emang hoki!</div>
        </div>

        <!-- Input Tebakan -->
        <div id="input-area" class="input-group">
            <input type="number" id="user-guess" class="guess-input" min="1" max="100" placeholder="0">
            <button onclick="playRound()" class="btn-submit">Tebak!</button>
        </div>

        <!-- Tombol Bawah -->
        <div class="action-container">
            <button onclick="resetGame()" id="reset-btn" class="btn-link btn-reset">Main Lagi 🔄</button>
            <a href="#" class="btn-link btn-back">Menangin Woii,biar dapet penghargaan 🤭</a>
        </div>
    </div>

    <script>
        let targetNumber;
        let maxLives = 7;
        let currentLives;

        const hintBox = document.getElementById('hint');
        const hintText = document.getElementById('hint-text'); // Tambahan target text baru
        const winnerGif = document.getElementById('winner-gif'); // Target elemen gif rusdi
        const livesBox = document.getElementById('lives');
        const inputArea = document.getElementById('input-area');
        const userInput = document.getElementById('user-guess');
        const resetBtn = document.getElementById('reset-btn');

        // Memulai game pertama kali
        initGame();

        function initGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            currentLives = maxLives;
            hintText.innerHTML = "Gua udah ngantongin satu angka dari 1 sampai 100. Coba tebak kalau lu emang hoki!";
            hintBox.style.color = "var(--text-muted)";
            winnerGif.style.display = "none"; // Umpetin lagi pas main ulang
            inputArea.style.display = "flex";
            resetBtn.style.display = "none";
            userInput.value = "";
            renderLives();
        }


        function renderLives() {
            let hearts = "";
            for(let i = 0; i < currentLives; i++) {
                hearts += "❤️ ";
            }
            livesBox.innerHTML = hearts || "💀 Kelar";
        }

        function playRound() {
            const guess = parseInt(userInput.value);

            // Validasi input kosong ato ngaco
            if (isNaN(guess) || guess < 1 || guess > 100) {
                hintText.innerText = "Masukkan angka yang bener pea! (1 - 100)";
                return;
            }

            if (guess === targetNumber) {
                // KONDISI MENANG (MUNCULIN GIF RUSDI)
                winnerGif.style.display = "block"; 
                hintText.innerHTML = `<span style="color: var(--system-green); font-weight:bold;">ANJAY BENER! 🎉<br>Angkanya emang ${targetNumber}. Lu resmi dapet gelar Jomok Kehormatan!🏅</span>`;
                endGame();
            } else {
                currentLives--;
                renderLives();

                if (currentLives <= 0) {
                    // KONDISI KALAH / GAME OVER
                    hintText.innerHTML = `<span style="color: var(--system-red); font-weight:bold;">GAME OVER 💀<br>Wkwkwk cupu bet tololl, angkanya itu ${targetNumber}. Coba lagi sono dah</span>`;
                    endGame();
                } else {
                    // KONDISI SALAH TAPI MASIH ADA NYAWA
                    if (guess > targetNumber) {
                        hintText.innerText = `Angka ${guess} ketinggian, mass! Turunin dikit.`;
                    } else {
                        hintText.innerText = `Angka ${guess} kekecilan, kocakk! Naikin dikit.`;
                    }
                    userInput.value = "";
                    userInput.focus();
                }
            }
        }

        function endGame() {
            inputArea.style.display = "none";
            resetBtn.style.display = "block";
        }

        function resetGame() {
            initGame();
        }

        // Biar bisa pencet 'Enter' pas nebak
        userInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                playRound();
            }
        });
    </script>

</body>
</html>
